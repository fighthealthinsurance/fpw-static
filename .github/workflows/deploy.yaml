name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

# Queue deploys; never kill an in-flight production deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Re-runs the cheap gates itself so a deploy can never ship a commit whose
  # checks were queued or failing. Cypress e2e runs in parallel in ci.yaml on
  # the same push and is deliberately not a deploy gate.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint && npm run tsc && npm run test
      # Production defaults unless the repository defines an API_HOST var.
      - run: npm run build
        env:
          API_HOST: ${{ vars.API_HOST }}
          SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  docker-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            API_HOST=${{ vars.API_HOST }}
            SUPPORT_EMAIL=${{ vars.SUPPORT_EMAIL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
