<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fight Paperwork — redirecting</title>
    <meta name="robots" content="noindex" />
    <link
      rel="canonical"
      href="https://www.fighthealthinsurance.com/pro_version"
    />
    <!--
      Catch-all for every retired fightpaperwork.com URL. GitHub Pages serves
      this file (with 404 status) for any path that matches no file; known
      legacy paths get their own generated stubs which take precedence. The
      script preserves the query string; the meta refresh is the no-JS
      fallback.
    -->
    <meta
      http-equiv="refresh"
      content="0;url=https://www.fighthealthinsurance.com/pro_version"
    />
    <script>
      location.replace(
        "https://www.fighthealthinsurance.com/pro_version" + location.search,
      );
    </script>
  </head>
  <body>
    <p>
      This page has moved. Continue to
      <a href="https://www.fighthealthinsurance.com/pro_version"
        >Fight Health Insurance for professionals</a
      >.
    </p>
    <p>
      Patients: appeal your denial for free at
      <a href="https://www.fighthealthinsurance.com/"
        >fighthealthinsurance.com</a
      >.
    </p>
  </body>
</html>
