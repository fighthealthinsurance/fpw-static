# Query string for the catch-all redirect: preserve existing args and tag
# untagged traffic with source=404 for attribution. (conf.d/*.conf files are
# included at http scope, where map is valid.)
map $args $notfound_qs {
    ""            "source=404";
    ~(^|&)source= $args;
    default       "$args&source=404";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep directory redirects host-relative so the container works behind
    # any proxy / ingress host.
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml text/plain text/xml application/manifest+json;

    include /etc/nginx/security-headers.conf;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Real 301s for legacy pro-app paths (the exported stub pages remain the
    # fallback on hosts without redirect support, e.g. GitHub Pages).
    location ^~ /auth/professional-signup {
        return 301 /schedule-demo/$is_args$args;
    }
    location ^~ /auth/provider-signup {
        return 301 /schedule-demo/$is_args$args;
    }
    location ^~ /auth/patient-signup {
        return 301 https://fighthealthinsurance.com/$is_args$args;
    }

    # Content-hashed build assets never change: cache forever.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/security-headers.conf;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=86400" always;
        include /etc/nginx/security-headers.conf;
    }

    # HTML always revalidates so deploys are visible immediately.
    location / {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ @notfound;
    }

    # Everything retired funnels to the demo signup form. Temporary redirect
    # on purpose: browsers cache 301s aggressively, and these are catch-all
    # paths that might come back into use.
    location @notfound {
        return 302 /schedule-demo/?$notfound_qs;
    }
}
